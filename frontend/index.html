<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 AM VOID</title>
    <style>
        :root {
            --cyan: #00f3ff;
            --purple: #aa00ff;
            --bg-color: #050505;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1a0b2e 0%, var(--bg-color) 100%);
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Glassmorphism Card Utils */
        .glass-card {
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1), 0 0 40px rgba(170, 0, 255, 0.1);
        }

        /* Neon Inputs */
        input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        /* Neon Buttons */
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, var(--cyan), var(--purple));
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        button:hover {
            box-shadow: 0 0 15px var(--cyan), 0 0 25px var(--purple);
            transform: translateY(-2px);
        }

        /* Redesigned Auth Buttons */
        button.google-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        button.google-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        button.google-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 15px 0 20px;
            color: #aaa;
            font-size: 12px;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .auth-divider span {
            padding: 0 10px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(170, 0, 255, 0.8);
            border: 1px solid var(--cyan);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 0 15px var(--purple);
            transition: bottom 0.4s ease;
            z-index: 100;
        }

        /* Timer Screen & Top Nav */
        #top-nav {
            display: none;
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
            align-items: center;
        }

        #auth-buttons {
            display: flex;
        }

        #auth-buttons button {
            width: auto;
            padding: 8px 15px;
            font-size: 14px;
            margin-left: 10px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ddd;
        }

        #auth-buttons button:hover {
            color: white;
            border-color: var(--cyan);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--cyan), var(--purple));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
            background-size: cover;
            background-position: center;
        }

        .dropdown {
            display: none;
            position: absolute;
            top: 55px;
            right: 0;
            width: 220px;
            padding: 15px;
            flex-direction: column;
            gap: 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .dropdown.show {
            display: flex;
            opacity: 1;
        }

        .dropdown-text {
            word-wrap: break-word;
        }

        .dropdown-name {
            font-weight: bold;
            font-size: 16px;
            color: white;
        }

        .dropdown-email {
            font-size: 12px;
            color: #aaa;
        }

        .dropdown-divider {
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin: 5px 0;
        }

        button.dropdown-action {
            background: transparent;
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff3366;
            padding: 8px;
            margin: 0;
        }

        button.dropdown-action:hover {
            background: rgba(255, 0, 0, 0.1);
            border-color: #ff3366;
            box-shadow: 0 0 10px rgba(255, 51, 102, 0.3);
            transform: translateY(0);
        }

        #timer-screen {
            display: none;
            width: 380px;
            padding: 50px 30px;
            text-align: center;
        }

        #timer-screen h1 {
            margin-bottom: 20px;
            font-size: 26px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--cyan);
        }

        .timer-label {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 30px;
        }

        #countdown {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 3px;
            color: var(--purple);
            text-shadow: 0 0 15px var(--purple), 0 0 30px rgba(170, 0, 255, 0.5);
        }

        #back-to-timer {
            display: none;
            margin-top: 15px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 14px;
            color: #aaa;
        }

        #back-to-timer:hover {
            color: white;
            border-color: var(--cyan);
        }

        /* Auth Screen */
        #auth-screen {
            display: none;
            width: 350px;
            padding: 40px;
            text-align: center;
            transition: opacity 0.5s ease;
        }

        #auth-screen h1 {
            margin-bottom: 30px;
            font-size: 28px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--cyan), 0 0 20px var(--purple);
        }

        .toggle-text {
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
        }

        .toggle-text span {
            color: var(--cyan);
            cursor: pointer;
            text-decoration: underline;
        }

        .error-msg {
            color: #ff3366;
            font-size: 14px;
            margin-bottom: 15px;
            min-height: 20px;
        }

        /* Chat Screen */
        #chat-screen {
            display: none;
            width: 100%;
            max-width: 600px;
            height: 90vh;
            flex-direction: column;
            padding: 20px;
        }

        #chat-header {
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--purple), 0 0 20px var(--cyan);
        }

        #chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Custom scrollbar */
        #chat-history::-webkit-scrollbar {
            width: 6px;
        }

        #chat-history::-webkit-scrollbar-thumb {
            background: rgba(170, 0, 255, 0.5);
            border-radius: 10px;
        }

        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 15px;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.my-message {
            align-self: flex-end;
            background: linear-gradient(135deg, rgba(170, 0, 255, 0.6), rgba(0, 0, 0, 0.6));
            border: 1px solid rgba(170, 0, 255, 0.3);
            border-bottom-right-radius: 0;
            box-shadow: 0 0 10px rgba(170, 0, 255, 0.2);
        }

        .message.other-message {
            align-self: flex-start;
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.6), rgba(0, 0, 0, 0.6));
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-bottom-left-radius: 0;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }

        .sender-name {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        #input-area {
            display: flex;
            gap: 10px;
        }

        #input-area input {
            margin-bottom: 0;
            flex: 1;
        }

        #input-area button {
            width: 80px;
        }

        .system-message {
            color: #ff3333;
            text-align: center;
            align-self: center;
            font-weight: bold;
            text-shadow: 0 0 10px #ff3333;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <!-- Top Nav -->
    <div id="top-nav">
        <div id="auth-buttons">
            <button id="nav-login-btn">Sign In</button>
            <button id="nav-signup-btn">Sign Up</button>
        </div>
        <div id="auth-profile" style="display: none; position: relative;">
            <div id="user-avatar" class="avatar"></div>
            <div id="profile-dropdown" class="glass-card dropdown">
                <div id="dropdown-name" class="dropdown-text dropdown-name"></div>
                <div id="dropdown-email" class="dropdown-text dropdown-email"></div>
                <hr class="dropdown-divider">
                <button id="logout-btn" class="dropdown-action">Log Out</button>
            </div>
        </div>
    </div>

    <!-- Timer Screen -->
    <div id="timer-screen" class="glass-card">
        <h1>THE VOID IS CLOSED</h1>
        <div class="timer-label">It awakens at 1:00 AM IST</div>
        <div id="countdown">00:00:00</div>
    </div>

    <!-- Auth Screen -->
    <div id="auth-screen" class="glass-card">
        <h1 id="auth-title">1 AM VOID</h1>
        <div class="error-msg" id="auth-error"></div>

        <button id="google-btn" class="google-btn">
            <svg viewBox="0 0 24 24">
                <path
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                    fill="#4285F4" />
                <path
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                    fill="#34A853" />
                <path
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                    fill="#FBBC05" />
                <path
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                    fill="#EA4335" />
            </svg>
            Continue with Google
        </button>

        <div class="auth-divider"><span>OR</span></div>

        <input type="email" id="email" placeholder="Email Address" autocomplete="off">
        <button id="email-btn">Continue with Email</button>

        <button id="back-to-timer" style="margin-top: 15px;">BACK TO TIMER</button>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">Magic link sent to your email!</div>

    <!-- Chat Screen -->
    <div id="chat-screen" class="glass-card">
        <div id="chat-header">1 AM VOID</div>
        <div id="chat-history"></div>
        <div id="input-area">
            <input type="text" id="message-input" placeholder="Whisper into the void..." autocomplete="off">
            <button id="send-btn">SEND</button>
        </div>
    </div>

    <script>
        let isSignupMode = false;
        let currentUser = null;
        let ws = null;

        const authScreen = document.getElementById('auth-screen');
        const chatScreen = document.getElementById('chat-screen');
        const timerScreen = document.getElementById('timer-screen');
        const topNav = document.getElementById('top-nav');
        const backToTimerBtn = document.getElementById('back-to-timer');

        const emailInput = document.getElementById('email');
        const emailBtn = document.getElementById('email-btn');
        const googleBtn = document.getElementById('google-btn');
        const authError = document.getElementById('auth-error');
        const toast = document.getElementById('toast');

        const chatHistory = document.getElementById('chat-history');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        document.getElementById('nav-login-btn').addEventListener('click', () => {
            timerScreen.style.display = 'none';
            topNav.style.display = 'none';
            authScreen.style.display = 'block';
            backToTimerBtn.style.display = 'block';
        });

        document.getElementById('nav-signup-btn').addEventListener('click', () => {
            timerScreen.style.display = 'none';
            topNav.style.display = 'none';
            authScreen.style.display = 'block';
            backToTimerBtn.style.display = 'block';
        });

        backToTimerBtn.addEventListener('click', () => {
            showDefaultScreen();
        });

        function getISTTime() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            return new Date(utc + (3600000 * 5.5));
        }

        function checkTimeGate() {
            const istTime = getISTTime();
            const hour = istTime.getHours();
            return hour >= 1 && hour < 5;
        }

        function updateCountdown() {
            const istTime = getISTTime();
            let target = new Date(istTime);

            if (istTime.getHours() >= 5) {
                target.setDate(target.getDate() + 1);
            }
            target.setHours(1, 0, 0, 0);

            const diff = target - istTime;
            if (diff <= 0) {
                if (timerScreen.style.display !== 'none') {
                    showDefaultScreen();
                }
                return;
            }

            const h = Math.floor(diff / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('countdown').innerText =
                `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        let countdownInterval;

        function showDefaultScreen() {
            const isOpen = checkTimeGate();
            if (isOpen) {
                timerScreen.style.display = 'none';
                if (!currentUser) topNav.style.display = 'none';
                authScreen.style.display = 'block';
                chatScreen.style.display = 'none';
                backToTimerBtn.style.display = 'none';
                if (countdownInterval) clearInterval(countdownInterval);
            } else {
                timerScreen.style.display = 'block';
                topNav.style.display = 'flex';
                authScreen.style.display = 'none';
                chatScreen.style.display = 'none';
                updateCountdown();
                if (countdownInterval) clearInterval(countdownInterval);
                countdownInterval = setInterval(updateCountdown, 1000);
            }
        }

        showDefaultScreen();

        googleBtn.addEventListener('click', () => {
            window.location.href = '/auth/google';
        });

        emailBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            if (!email || !email.includes('@')) {
                authError.style.color = '#ff3366';
                authError.innerText = 'Please enter a valid email address.';
                return;
            }
            authError.innerText = '';

            try {
                const response = await fetch('/api/auth/email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (!response.ok) {
                    authError.style.color = '#ff3366';
                    authError.innerText = data.detail || 'An error occurred.';
                    return;
                }

                showToast('Magic link sent to your email!');
            } catch (err) {
                authError.style.color = '#ff3366';
                authError.innerText = 'Server unreached. The void is silent.';
            }
        });

        function showToast(msg) {
            toast.innerText = msg;
            toast.style.bottom = '20px';
            setTimeout(() => {
                toast.style.bottom = '-50px';
            }, 3000);
        }

        const authProfile = document.getElementById('auth-profile');
        const authButtons = document.getElementById('auth-buttons');
        const userAvatar = document.getElementById('user-avatar');
        const profileDropdown = document.getElementById('profile-dropdown');
        const dropdownName = document.getElementById('dropdown-name');
        const dropdownEmail = document.getElementById('dropdown-email');
        const logoutBtn = document.getElementById('logout-btn');

        function updateAuthUI(user) {
            topNav.style.display = 'flex';
            if (user) {
                authButtons.style.display = 'none';
                authProfile.style.display = 'block';
                dropdownName.innerText = user.name || user.email;
                dropdownEmail.innerText = user.email;

                if (user.picture) {
                    userAvatar.style.backgroundImage = `url('${user.picture}')`;
                    userAvatar.innerText = '';
                } else {
                    userAvatar.style.backgroundImage = 'none';
                    userAvatar.innerText = (user.name || user.email).charAt(0).toUpperCase();
                }
            } else {
                authButtons.style.display = 'flex';
                authProfile.style.display = 'none';
            }
        }

        userAvatar.addEventListener('click', (e) => {
            e.stopPropagation();
            profileDropdown.classList.toggle('show');
        });

        window.addEventListener('click', () => {
            if (profileDropdown.classList.contains('show')) {
                profileDropdown.classList.remove('show');
            }
        });

        logoutBtn.addEventListener('click', async () => {
            try {
                const res = await fetch('/api/logout', { method: 'POST' });
                if (res.ok) window.location.reload();
            } catch (e) { }
        });

        // Validate session cookie on load if timegate is open or to bypass
        async function validateSession() {
            try {
                const response = await fetch('/api/user/me');
                if (response.ok) {
                    const data = await response.json();
                    currentUser = data.email;
                    updateAuthUI(data);

                    const isOpen = checkTimeGate();
                    if (isOpen) {
                        timerScreen.style.display = 'none';
                        authScreen.style.display = 'none';
                        chatScreen.style.display = 'flex';
                        connectWebSocket();
                        if (countdownInterval) clearInterval(countdownInterval);
                    }
                } else {
                    updateAuthUI(null);
                    // Ensure topNav hides if timegate is open and not logged in (auth screen visible)
                    if (checkTimeGate()) topNav.style.display = 'none';
                }
            } catch (e) {
                updateAuthUI(null);
                if (checkTimeGate()) topNav.style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            validateSession();
        });

        function connectWebSocket() {
            const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                const sysMsg = document.createElement('div');
                sysMsg.className = 'system-message';
                sysMsg.style.color = 'var(--cyan)';
                sysMsg.innerText = 'You are connected to the Void.';
                chatHistory.appendChild(sysMsg);
                scrollToBottom();
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    appendMessage(data.sender, data.text);
                } catch (e) { }
            };

            ws.onclose = (event) => {
                const sysMsg = document.createElement('div');
                sysMsg.className = 'system-message';

                if (event.code === 1008) {
                    sysMsg.innerText = "The Void is closed. It only opens at 1 AM.";
                } else {
                    sysMsg.innerText = "Connection lost.";
                }

                chatHistory.appendChild(sysMsg);
                messageInput.disabled = true;
                sendBtn.disabled = true;
                scrollToBottom();
            };
        }

        function appendMessage(sender, text) {
            const msgDiv = document.createElement('div');
            // Fix: ensure case-insensitive, trimmed comparison to correctly identify same user across devices
            const isMe = String(sender).trim().toLowerCase() === String(currentUser).trim().toLowerCase();
            msgDiv.className = `message ${isMe ? 'my-message' : 'other-message'}`;

            const senderName = document.createElement('div');
            senderName.className = 'sender-name';
            senderName.innerText = sender;

            const textNode = document.createTextNode(text);

            msgDiv.appendChild(senderName);
            msgDiv.appendChild(textNode);
            chatHistory.appendChild(msgDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function sendMessage() {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            const text = messageInput.value.trim();
            if (text) {
                ws.send(JSON.stringify({ sender: currentUser, text }));
                messageInput.value = '';
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>

</html>
