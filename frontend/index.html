<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 AM VOID</title>
    <style>
        :root {
            --cyan: #00f3ff;
            --purple: #aa00ff;
            --bg-color: #050505;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1a0b2e 0%, var(--bg-color) 100%);
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Glassmorphism Card Utils */
        .glass-card {
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1), 0 0 40px rgba(170, 0, 255, 0.1);
        }

        /* Neon Inputs */
        input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        /* Neon Buttons */
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, var(--cyan), var(--purple));
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        button:hover {
            box-shadow: 0 0 15px var(--cyan), 0 0 25px var(--purple);
            transform: translateY(-2px);
        }

        /* Timer Screen & Top Nav */
        #top-nav {
            display: none;
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
        }

        #top-nav button {
            width: auto;
            padding: 8px 15px;
            font-size: 14px;
            margin-left: 10px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ddd;
        }
        
        #top-nav button:hover {
            color: white;
            border-color: var(--cyan);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
        }

        #timer-screen {
            display: none;
            width: 380px;
            padding: 50px 30px;
            text-align: center;
        }

        #timer-screen h1 {
            margin-bottom: 20px;
            font-size: 26px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--cyan);
        }

        .timer-label {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 30px;
        }

        #countdown {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 3px;
            color: var(--purple);
            text-shadow: 0 0 15px var(--purple), 0 0 30px rgba(170, 0, 255, 0.5);
        }
        
        #back-to-timer {
            display: none;
            margin-top: 15px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 14px;
            color: #aaa;
        }
        
        #back-to-timer:hover {
            color: white;
            border-color: var(--cyan);
        }

        /* Auth Screen */
        #auth-screen {
            display: none;
            width: 350px;
            padding: 40px;
            text-align: center;
            transition: opacity 0.5s ease;
        }

        #auth-screen h1 {
            margin-bottom: 30px;
            font-size: 28px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--cyan), 0 0 20px var(--purple);
        }

        .toggle-text {
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
        }

        .toggle-text span {
            color: var(--cyan);
            cursor: pointer;
            text-decoration: underline;
        }

        .error-msg {
            color: #ff3366;
            font-size: 14px;
            margin-bottom: 15px;
            min-height: 20px;
        }

        /* Chat Screen */
        #chat-screen {
            display: none;
            width: 100%;
            max-width: 600px;
            height: 90vh;
            flex-direction: column;
            padding: 20px;
        }

        #chat-header {
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--purple), 0 0 20px var(--cyan);
        }

        #chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Custom scrollbar */
        #chat-history::-webkit-scrollbar {
            width: 6px;
        }

        #chat-history::-webkit-scrollbar-thumb {
            background: rgba(170, 0, 255, 0.5);
            border-radius: 10px;
        }

        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 15px;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.my-message {
            align-self: flex-end;
            background: linear-gradient(135deg, rgba(170, 0, 255, 0.6), rgba(0, 0, 0, 0.6));
            border: 1px solid rgba(170, 0, 255, 0.3);
            border-bottom-right-radius: 0;
            box-shadow: 0 0 10px rgba(170, 0, 255, 0.2);
        }

        .message.other-message {
            align-self: flex-start;
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.6), rgba(0, 0, 0, 0.6));
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-bottom-left-radius: 0;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }

        .sender-name {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        #input-area {
            display: flex;
            gap: 10px;
        }

        #input-area input {
            margin-bottom: 0;
            flex: 1;
        }

        #input-area button {
            width: 80px;
        }

        .system-message {
            color: #ff3333;
            text-align: center;
            align-self: center;
            font-weight: bold;
            text-shadow: 0 0 10px #ff3333;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <!-- Top Nav -->
    <div id="top-nav">
        <button id="nav-login-btn">Sign In</button>
        <button id="nav-signup-btn">Sign Up</button>
    </div>

    <!-- Timer Screen -->
    <div id="timer-screen" class="glass-card">
        <h1>THE VOID IS CLOSED</h1>
        <div class="timer-label">It awakens at 1:00 AM IST</div>
        <div id="countdown">00:00:00</div>
    </div>

    <!-- Auth Screen -->
    <div id="auth-screen" class="glass-card">
        <h1 id="auth-title">1 AM VOID</h1>
        <div class="error-msg" id="auth-error"></div>
        <input type="text" id="username" placeholder="Username" autocomplete="off">
        <input type="password" id="password" placeholder="Password">
        <button id="auth-btn">ENTER THE VOID</button>
        <button id="back-to-timer">BACK TO TIMER</button>
        <div class="toggle-text">
            <span id="toggle-auth">Need an account? Sign up</span>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="chat-screen" class="glass-card">
        <div id="chat-header">1 AM VOID</div>
        <div id="chat-history"></div>
        <div id="input-area">
            <input type="text" id="message-input" placeholder="Whisper into the void..." autocomplete="off">
            <button id="send-btn">SEND</button>
        </div>
    </div>

    <script>
        let isSignupMode = false;
        let currentUser = null;
        let ws = null;

        const authScreen = document.getElementById('auth-screen');
        const chatScreen = document.getElementById('chat-screen');
        const timerScreen = document.getElementById('timer-screen');
        const topNav = document.getElementById('top-nav');
        const backToTimerBtn = document.getElementById('back-to-timer');
        
        const toggleAuthBtn = document.getElementById('toggle-auth');
        const authBtn = document.getElementById('auth-btn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const authError = document.getElementById('auth-error');

        const chatHistory = document.getElementById('chat-history');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        function setupAuthMode() {
            authError.innerText = '';
            if (isSignupMode) {
                authBtn.innerText = 'CREATE REALITY';
                toggleAuthBtn.innerText = 'Already have an account? Login';
            } else {
                authBtn.innerText = 'ENTER THE VOID';
                toggleAuthBtn.innerText = 'Need an account? Sign up';
            }
        }

        toggleAuthBtn.addEventListener('click', () => {
            isSignupMode = !isSignupMode;
            setupAuthMode();
        });

        document.getElementById('nav-login-btn').addEventListener('click', () => {
            isSignupMode = false;
            setupAuthMode();
            timerScreen.style.display = 'none';
            topNav.style.display = 'none';
            authScreen.style.display = 'block';
            backToTimerBtn.style.display = 'block';
        });

        document.getElementById('nav-signup-btn').addEventListener('click', () => {
            isSignupMode = true;
            setupAuthMode();
            timerScreen.style.display = 'none';
            topNav.style.display = 'none';
            authScreen.style.display = 'block';
            backToTimerBtn.style.display = 'block';
        });
        
        backToTimerBtn.addEventListener('click', () => {
            showDefaultScreen();
        });

        function getISTTime() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            return new Date(utc + (3600000 * 5.5));
        }

        function checkTimeGate() {
            const istTime = getISTTime();
            const hour = istTime.getHours();
            return hour >= 1 && hour < 5;
        }

        function updateCountdown() {
            const istTime = getISTTime();
            let target = new Date(istTime);
            
            if (istTime.getHours() >= 5) {
                target.setDate(target.getDate() + 1);
            }
            target.setHours(1, 0, 0, 0);
            
            const diff = target - istTime;
            if (diff <= 0) {
                if (timerScreen.style.display !== 'none') {
                    showDefaultScreen();
                }
                return;
            }
            
            const h = Math.floor(diff / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById('countdown').innerText = 
                `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        let countdownInterval;

        function showDefaultScreen() {
            const isOpen = checkTimeGate();
            if (isOpen) {
                timerScreen.style.display = 'none';
                topNav.style.display = 'none';
                authScreen.style.display = 'block';
                chatScreen.style.display = 'none';
                backToTimerBtn.style.display = 'none';
                if (countdownInterval) clearInterval(countdownInterval);
            } else {
                timerScreen.style.display = 'block';
                topNav.style.display = 'block';
                authScreen.style.display = 'none';
                chatScreen.style.display = 'none';
                updateCountdown();
                if (countdownInterval) clearInterval(countdownInterval);
                countdownInterval = setInterval(updateCountdown, 1000);
            }
        }
        
        showDefaultScreen();

        authBtn.addEventListener('click', async () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (!username || !password) {
                authError.style.color = '#ff3366';
                authError.innerText = 'Both fields are required.';
                return;
            }

            authError.innerText = '';
            const endpoint = isSignupMode ? '/api/signup' : '/api/login';

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();

                if (!response.ok) {
                    authError.style.color = '#ff3366';
                    authError.innerText = data.error || 'Authentication failed.';
                    return;
                }

                // Switch back to login if signup was successful
                if (isSignupMode) {
                    isSignupMode = false;
                    authError.style.color = '#00f3ff';
                    authError.innerText = 'Signup successful! Please login.';
                    authBtn.innerText = 'ENTER THE VOID';
                    toggleAuthBtn.innerText = 'Need an account? Sign up';
                    passwordInput.value = '';
                    setTimeout(() => { authError.style.color = '#ff3366'; authError.innerText = ''; }, 3000);
                    return;
                }

                // Successful login
                currentUser = username;
                authScreen.style.display = 'none';
                chatScreen.style.display = 'flex';
                connectWebSocket();
            } catch (err) {
                authError.style.color = '#ff3366';
                authError.innerText = 'Server unreached. The void is silent.';
            }
        });

        function connectWebSocket() {
            const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                const sysMsg = document.createElement('div');
                sysMsg.className = 'system-message';
                sysMsg.style.color = 'var(--cyan)';
                sysMsg.innerText = 'You are connected to the Void.';
                chatHistory.appendChild(sysMsg);
                scrollToBottom();
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    appendMessage(data.sender, data.text);
                } catch (e) { }
            };

            ws.onclose = (event) => {
                const sysMsg = document.createElement('div');
                sysMsg.className = 'system-message';

                if (event.code === 1008) {
                    sysMsg.innerText = "The Void is closed. It only opens at 1 AM.";
                } else {
                    sysMsg.innerText = "Connection lost.";
                }

                chatHistory.appendChild(sysMsg);
                messageInput.disabled = true;
                sendBtn.disabled = true;
                scrollToBottom();
            };
        }

        function appendMessage(sender, text) {
            const msgDiv = document.createElement('div');
            // Fix: ensure case-insensitive, trimmed comparison to correctly identify same user across devices
            const isMe = String(sender).trim().toLowerCase() === String(currentUser).trim().toLowerCase();
            msgDiv.className = `message ${isMe ? 'my-message' : 'other-message'}`;

            const senderName = document.createElement('div');
            senderName.className = 'sender-name';
            senderName.innerText = sender;

            const textNode = document.createTextNode(text);

            msgDiv.appendChild(senderName);
            msgDiv.appendChild(textNode);
            chatHistory.appendChild(msgDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function sendMessage() {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            const text = messageInput.value.trim();
            if (text) {
                ws.send(JSON.stringify({ sender: currentUser, text }));
                messageInput.value = '';
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>

</html>
